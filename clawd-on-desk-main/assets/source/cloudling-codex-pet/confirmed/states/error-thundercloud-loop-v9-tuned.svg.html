<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Cloudling — error thundercloud loop v9 tuned</title>
<style>
* { margin: 0; box-sizing: border-box; }
body {
  background: #090b16;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 20px 34px;
  font-family: system-ui, -apple-system, "PingFang SC", sans-serif;
  color: #e0e0e6;
  gap: 14px;
}
body.light { background: #f4f4f6; color: #333; }
h1 { font-size: 15px; font-weight: 600; opacity: .9; }
h1 .tag {
  display: inline-block;
  background: rgba(122, 157, 255, 0.18);
  color: #7A9DFF;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 600;
  font-family: ui-monospace, monospace;
  margin-left: 6px;
}
.meta {
  font-size: 11px;
  opacity: .72;
  text-align: center;
  max-width: 820px;
  line-height: 1.6;
}
.meta b { color: #9fb2ff; opacity: 1; }
body.light .meta b { color: #3941FF; }
.toolbar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  font-size: 11px;
}
.toolbar button {
  background: #1f2230;
  color: #c8cad8;
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 6px;
  padding: 4px 10px;
  cursor: pointer;
  font-size: 10px;
  font-family: ui-monospace, monospace;
}
.toolbar button:hover { background: #2a3044; }
body.light .toolbar button { background: #fff; color: #555; border-color: rgba(0,0,0,.08); }
.stage {
  background: radial-gradient(circle at 50% 42%, #111528 0%, #090b16 62%, #060711 100%);
  border-radius: 14px;
  box-shadow: 0 18px 60px rgba(0,0,0,.42);
  overflow: hidden;
}
body.light .stage {
  background: #fff;
  box-shadow: 0 18px 60px -20px rgba(57, 65, 255, 0.18), 0 4px 12px rgba(0,0,0,0.04);
}
.stage svg { display: block; width: 360px; height: 360px; }
.params {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px 28px;
  background: #151824;
  border-radius: 12px;
  padding: 16px 22px;
  font-size: 11px;
  color: #c0c0c8;
  min-width: min(820px, calc(100vw - 40px));
}
body.light .params { background: #fff; color: #666; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.params h3 {
  grid-column: 1 / -1;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: #858ca8;
  margin-top: 6px;
  margin-bottom: 2px;
  border-bottom: 1px solid rgba(255,255,255,.08);
  padding-bottom: 4px;
}
body.light .params h3 { color: #999; border-color: rgba(0,0,0,.06); }
.params h3:first-child { margin-top: 0; }
.params label {
  display: grid;
  grid-template-columns: 160px 1fr 70px;
  gap: 8px;
  align-items: center;
}
.params input[type="range"] { accent-color: #7A9DFF; }
.params .val {
  font-family: ui-monospace, monospace;
  text-align: right;
  font-size: 10px;
  opacity: .8;
}
.statusbar,
.preset {
  font-size: 10px;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  color: #9fb2ff;
  background: #151824;
  border-radius: 8px;
  padding: 6px 14px;
  min-width: min(820px, calc(100vw - 40px));
  text-align: center;
  letter-spacing: 0.03em;
}
.preset {
  color: rgba(224,224,230,.70);
  text-align: left;
  white-space: pre-wrap;
  line-height: 1.45;
}
body.light .statusbar,
body.light .preset { background: #fff; color: #3941FF; }
@media (max-width: 760px) {
  .params { grid-template-columns: 1fr; }
  .params label { grid-template-columns: 140px 1fr 60px; }
  .stage svg { width: min(360px, calc(100vw - 40px)); height: auto; }
}
</style>
</head>
<body>

<div class="meta">

<div class="stage">

    <defs>
      <path id="cloud-shape" d="M9.064 3.344a4.578 4.578 0 012.285-.312c1 .115 1.891.54 2.673 1.275.01.01.024.017.037.021a.09.09 0 00.043 0 4.55 4.55 0 013.046.275l.047.022.116.057a4.581 4.581 0 012.188 2.399c.209.51.313 1.041.315 1.595a4.24 4.24 0 01-.134 1.223.123.123 0 00.03.115c.594.607.988 1.33 1.183 2.17.289 1.425-.007 2.71-.887 3.854l-.136.166a4.548 4.548 0 01-2.201 1.388.123.123 0 00-.081.076c-.191.551-.383 1.023-.74 1.494-.9 1.187-2.222 1.846-3.711 1.838-1.187-.006-2.239-.44-3.157-1.302a.107.107 0 00-.105-.024c-.388.125-.78.143-1.204.138a4.441 4.441 0 01-1.945-.466 4.544 4.544 0 01-1.61-1.335c-.152-.202-.303-.392-.414-.617a5.81 5.81 0 01-.37-.961 4.582 4.582 0 01-.014-2.298.124.124 0 00.006-.056.085.085 0 00-.027-.048 4.467 4.467 0 01-1.034-1.651 3.896 3.896 0 01-.251-1.192 5.189 5.189 0 01.141-1.6c.337-1.112.982-1.985 1.933-2.618.212-.141.413-.251.601-.33.215-.089.43-.164.646-.227a.098.098 0 00.065-.066 4.51 4.51 0 01.829-1.615 4.535 4.535 0 011.837-1.388z"/>
      <clipPath id="cloud-clip"><use href="#cloud-shape"/></clipPath>

<div class="statusbar" id="statusbar">phase --</div>
<div class="params" id="params"></div>
<pre class="preset" id="preset"></pre>

<script>
const TAU = Math.PI * 2;
const DEFAULTS = {
  period: 4.0,
  breathAmp: 0.070,
  breathSpeed: 1.00,
  squeezeStart: 0.53,
  squeezeDuration: 0.66,
  squeezeRamp: 0.60,
  squeezePower: 0.95,
  reboundOvershoot: 0.018,
  reboundDamping: 0.78,
  squashAmp: 0.088,
  squashXBoost: 0.058,
  squeezeDropY: 0.30,
  rainDelay: 0.05,
  rainDuration: 0.66,
  rainBurstPower: 1.00,
  flowAlpha: 0.56,
  flowTravel: 4.1,
  flowSpeed: 1.25,
  flowBlur: 0.50,
  darkFlowAlpha: 0.48,
  bandAlpha: 0.28,
  twistFlowBoost: 0.55,
  rainBaseOpacity: 0.58,
  rainBurstOpacity: 0.34,
  rainBaseSpeed: 0.62,
  rainBurstSpeed: 0.82,
  rainBaseLength: 1.30,
  rainBurstLength: 1.60,
  rainCount: 8,
  rainDrift: 0.40,
  eyeDim: 0.08,
};
let P = { ...DEFAULTS };
let paused = false;
let pauseStart = 0;
let pausedTotal = 0;
const startedAt = performance.now();
const RAIN_LINES = [
  { x: 1.8,  y: 22.9, len: 1.15, delay: 0.04, alpha: 0.78 },
  { x: 4.3,  y: 24.1, len: 1.00, delay: 0.31, alpha: 0.52 },
  { x: 6.5,  y: 22.9, len: 0.92, delay: 0.62, alpha: 0.42 },
  { x: 9.1,  y: 24.5, len: 0.88, delay: 0.83, alpha: 0.36 },
  { x: 14.9, y: 23.4, len: 0.92, delay: 0.18, alpha: 0.40 },
  { x: 17.4, y: 24.4, len: 1.05, delay: 0.49, alpha: 0.54 },
  { x: 20.0, y: 23.0, len: 1.22, delay: 0.70, alpha: 0.82 },
  { x: 22.6, y: 24.0, len: 1.00, delay: 0.92, alpha: 0.50 },
];

const PARAM_DEFS = [
  { group: '循环 / CYCLE' },
  { key: 'period', label: '总周期 s', min: 3.6, max: 7.0, step: 0.1 },
  { key: 'squeezeStart', label: '开始拧的位置', min: 0.08, max: 0.70, step: 0.01 },
  { key: 'squeezeDuration', label: '拧+回弹时长', min: 0.22, max: 0.86, step: 0.01 },
  { key: 'squeezeRamp', label: '压扁用时占比', min: 0.20, max: 0.70, step: 0.01 },
  { key: 'squeezePower', label: '压扁曲线硬度', min: 0.6, max: 3.0, step: 0.05 },
  { group: '云体呼吸 / BODY' },
  { key: 'breathAmp', label: '呼吸大小幅度', min: 0.00, max: 0.10, step: 0.005 },
  { key: 'breathSpeed', label: '呼吸速度倍数', min: 0.3, max: 2.0, step: 0.05 },
  { key: 'squashAmp', label: '拧毛巾压扁幅度', min: 0.00, max: 0.16, step: 0.005 },
  { key: 'squashXBoost', label: '压扁横向膨胀', min: 0.00, max: 0.12, step: 0.005 },
  { key: 'squeezeDropY', label: '压扁下沉', min: 0.00, max: 0.90, step: 0.02 },
  { key: 'reboundOvershoot', label: '回弹过冲', min: 0.00, max: 0.08, step: 0.002 },
  { key: 'reboundDamping', label: '回弹衰减', min: 0.20, max: 1.20, step: 0.05 },
  { group: '挤出的雨 / BURST' },
  { key: 'rainDelay', label: '雨跟拧的错位', min: 0.00, max: 0.14, step: 0.01 },
  { key: 'rainDuration', label: '雨随拧持续', min: 0.20, max: 0.86, step: 0.01 },
  { key: 'rainBurstPower', label: '雨峰曲线硬度', min: 0.5, max: 3.0, step: 0.05 },
  { group: '乌云流动 / FLOW' },
  { key: 'flowAlpha', label: '浅色漫反射流动', min: 0.00, max: 0.90, step: 0.01 },
  { key: 'darkFlowAlpha', label: '暗部漫反射流动', min: 0.00, max: 0.90, step: 0.01 },
  { key: 'bandAlpha', label: '漫反射流带强度', min: 0.00, max: 0.80, step: 0.01 },
  { key: 'flowTravel', label: '流动位移', min: 0.0, max: 7.0, step: 0.1 },
  { key: 'flowSpeed', label: '流动速度', min: 0.2, max: 3.0, step: 0.05 },
  { key: 'flowBlur', label: '流动柔化', min: 0.0, max: 1.0, step: 0.02 },
  { key: 'twistFlowBoost', label: '拧时流动加速感', min: 0.00, max: 1.20, step: 0.05 },
  { group: '雨 / RAIN' },
  { key: 'rainCount', label: '雨线数量', min: 2, max: 8, step: 1 },
  { key: 'rainBaseOpacity', label: '常态雨透明度', min: 0.05, max: 1.0, step: 0.01 },
  { key: 'rainBurstOpacity', label: '挤出时增亮', min: 0.00, max: 0.70, step: 0.01 },
  { key: 'rainBaseSpeed', label: '常态雨速度', min: 0.15, max: 1.5, step: 0.05 },
  { key: 'rainBurstSpeed', label: '挤出时加速', min: 0.00, max: 1.8, step: 0.05 },
  { key: 'rainBaseLength', label: '常态雨长度', min: 0.40, max: 2.4, step: 0.05 },
  { key: 'rainBurstLength', label: '挤出时变长', min: 0.00, max: 2.8, step: 0.05 },
  { key: 'rainDrift', label: '雨线斜移', min: 0.00, max: 1.2, step: 0.02 },
  { group: '眼睛 / EYES' },
  { key: 'eyeDim', label: '拧时眼睛变暗', min: 0.00, max: 0.30, step: 0.01 },
];

const el = {
  cloudRoot: document.getElementById('cloud-root'),
  rain: document.getElementById('rain'),
  bodyGrad: document.getElementById('body-grad'),
  bodyHi: document.getElementById('body-hi'),
  bodyCore: document.getElementById('body-core'),
  coreA: document.getElementById('core-stop-a'),
  coreB: document.getElementById('core-stop-b'),
  eyeGrad: document.getElementById('eye-grad'),
  eyes: document.getElementById('eyes'),
  eyeL: document.getElementById('eye-l'),
  eyeR: document.getElementById('eye-r'),
  flowLight: document.getElementById('flow-light'),
  flowDark: document.getElementById('flow-dark'),
  flowBand: document.getElementById('flow-band'),
  blur: document.getElementById('mist-blur-node'),
  ground: document.getElementById('ground'),
  hardShadow: document.getElementById('hard-shadow'),
  blueGlow: document.getElementById('blue-glow'),
  status: document.getElementById('statusbar'),
  preset: document.getElementById('preset'),
};

const RAIN_COPIES = 2;
const rainPaths = RAIN_LINES.map(() => {
  const copies = [];
  for (let i = 0; i < RAIN_COPIES; i++) {
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('fill', 'none');
    el.rain.appendChild(path);
    copies.push(path);
  }
  return copies;
});

function buildParams() {
  const params = document.getElementById('params');
  params.innerHTML = '';
  for (const def of PARAM_DEFS) {
    if (def.group) {
      const h = document.createElement('h3');
      h.textContent = def.group;
      params.appendChild(h);
      continue;
    }
    const lab = document.createElement('label');
    lab.innerHTML = `
      <span>${def.label}</span>
      <input type="range" data-key="${def.key}" min="${def.min}" max="${def.max}" step="${def.step}" value="${P[def.key]}"/>
      <span class="val" data-val="${def.key}">${formatValue(P[def.key], def.step)}</span>
    `;
    const range = lab.querySelector('input');
    const val = lab.querySelector('[data-val]');
    range.oninput = e => {
      P[def.key] = parseFloat(e.target.value);
      if (def.key === 'rainCount') P[def.key] = Math.round(P[def.key]);
      val.textContent = formatValue(P[def.key], def.step);
      updatePreset();
    };
    params.appendChild(lab);
  }
  updatePreset();
}

function formatValue(v, step) {
  if (Number.isInteger(step)) return String(v);
  if (step >= 0.1) return Number(v).toFixed(1);
  if (step >= 0.01) return Number(v).toFixed(2);
  return Number(v).toFixed(3);
}

function updatePreset() {
  const keys = PARAM_DEFS.filter(d => d.key).map(d => d.key);
  const subset = {};
  keys.forEach(k => subset[k] = P[k]);
  el.preset.textContent = `当前参数: ${JSON.stringify(subset)}`;
}

function clamp01(v) { return Math.max(0, Math.min(1, v)); }
function mix(a, b, t) { return a + (b - a) * t; }
function smoothstep(edge0, edge1, x) {
  const t = clamp01((x - edge0) / (edge1 - edge0));
  return t * t * (3 - 2 * t);
}
function wrap01(v) {
  return ((v % 1) + 1) % 1;
}

function cycleLocal(phase, start, duration) {
  const u = wrap01(phase - start);
  if (u > duration) return null;
  return u / duration;
}

function squeezeAt(phase) {
  const u = cycleLocal(phase, P.squeezeStart, P.squeezeDuration);
  if (u === null) return 0;
  const ramp = clamp01(P.squeezeRamp);
  if (u <= ramp) {
    return Math.pow(smoothstep(0, 1, u / ramp), P.squeezePower);
  }
  const release = (u - ramp) / Math.max(0.001, 1 - ramp);
  return Math.pow(1 - smoothstep(0, 1, release), P.squeezePower);
}

function rainBurstAt(phase) {
  const start = wrap01(P.squeezeStart + P.rainDelay);
  const u = cycleLocal(phase, start, P.rainDuration);
  if (u === null) return 0;
  const rampInCycle = Math.max(0.04, P.squeezeDuration * P.squeezeRamp);
  const ramp = clamp01(rampInCycle / Math.max(0.001, P.rainDuration));
  if (u <= ramp) {
    return Math.pow(smoothstep(0, 1, u / ramp), P.rainBurstPower);
  }
  const release = (u - ramp) / Math.max(0.001, 1 - ramp);
  return Math.pow(1 - smoothstep(0, 1, release), P.rainBurstPower);
}

function reboundAt(phase) {
  const start = wrap01(P.squeezeStart + P.squeezeDuration * P.squeezeRamp);
  const duration = Math.max(0.08, P.squeezeDuration * (1 - P.squeezeRamp));
  const u = cycleLocal(phase, start, duration);
  if (u === null) return 0;
  return Math.sin(Math.PI * u) * Math.pow(1 - u, P.reboundDamping);
}

function renderAt(timeMs) {
  const t = timeMs / 1000;
  const phase = (t / P.period) % 1;
  const squeeze = squeezeAt(phase);
  const rainBurst = rainBurstAt(phase);
  const rebound = reboundAt(phase);
  const breath = 0.5 + 0.5 * Math.sin(TAU * (phase * P.breathSpeed - 0.18));
  const breathScale = 1 + (breath - 0.5) * 2 * P.breathAmp;
  const sx = 1.02 * breathScale + squeeze * P.squashXBoost - rebound * P.reboundOvershoot * 0.35;
  const sy = 0.995 * breathScale - squeeze * P.squashAmp + rebound * P.reboundOvershoot;
  const ty = 0.08 + (breath - 0.5) * 0.18 + squeeze * P.squeezeDropY - rebound * 0.12;
  const twist = Math.sin(TAU * phase * 2.0) * squeeze;
  const rot = (breath - 0.5) * 1.1 - squeeze * 1.15 + rebound * 0.55 + twist * 0.55;
  el.cloudRoot.setAttribute(
    'transform',
    `translate(12 ${(12.1 + ty).toFixed(3)}) rotate(${rot.toFixed(3)}) scale(${sx.toFixed(4)} ${sy.toFixed(4)}) translate(-12 -12)`
  );

  const flow = t / P.period * P.flowSpeed * (1 + squeeze * P.twistFlowBoost);
  el.bodyGrad.setAttribute('y1', (1.0 + Math.sin(flow * TAU * 0.36) * 0.35).toFixed(3));
  el.bodyGrad.setAttribute('y2', (22.9 + Math.cos(flow * TAU * 0.32) * 0.30).toFixed(3));
  el.bodyHi.setAttribute('cx', (9.2 + Math.sin(flow * TAU * 0.28) * 0.65).toFixed(3));
  el.bodyHi.setAttribute('cy', (5.2 + Math.cos(flow * TAU * 0.24) * 0.35).toFixed(3));
  el.bodyHi.setAttribute('r', (18.0 + Math.sin(flow * TAU * 0.20) * 0.18).toFixed(3));
  el.bodyCore.setAttribute('cx', (12.2 + Math.sin(flow * TAU * 0.26 + 1.5) * 0.55).toFixed(3));
  el.bodyCore.setAttribute('cy', (17.5 + Math.cos(flow * TAU * 0.22) * 0.40).toFixed(3));
  el.bodyCore.setAttribute('r', (11.2 + Math.sin(flow * TAU * 0.18) * 0.25).toFixed(3));
  el.coreA.setAttribute('stop-opacity', '0.20');
  el.coreB.setAttribute('stop-opacity', '0.08');

  const travel = P.flowTravel;
  el.blur.setAttribute('stdDeviation', P.flowBlur.toFixed(3));
  el.flowLight.setAttribute('cx', (8.5 + Math.sin(flow * TAU * 0.45) * travel * 0.55).toFixed(3));
  el.flowLight.setAttribute('cy', (7.0 + Math.cos(flow * TAU * 0.34) * travel * 0.18).toFixed(3));
  el.flowLight.setAttribute('opacity', (P.flowAlpha * 0.50).toFixed(3));
  el.flowDark.setAttribute('cx', (15.6 + Math.cos(flow * TAU * 0.40) * travel * 0.55).toFixed(3));
  el.flowDark.setAttribute('cy', (17.4 + Math.sin(flow * TAU * 0.32) * travel * 0.20).toFixed(3));
  el.flowDark.setAttribute('opacity', (P.darkFlowAlpha * 0.70).toFixed(3));
  const bandX = -13 + ((flow * 18) % 24);
  el.flowBand.setAttribute('transform', `translate(${bandX.toFixed(3)} 0) rotate(-12 12 12)`);
  el.flowBand.setAttribute('opacity', (P.bandAlpha * 0.46).toFixed(3));

  const eyeYOffset = squeeze * 0.14;
  el.eyes.setAttribute('opacity', (0.90 - squeeze * P.eyeDim + Math.sin(flow * TAU * 1.0) * 0.012).toFixed(3));
  el.eyeGrad.setAttribute('y1', (8.5 + Math.sin(flow * TAU * 0.74) * 0.8).toFixed(3));
  el.eyeGrad.setAttribute('y2', (15.8 + Math.sin(flow * TAU * 0.74) * 0.8).toFixed(3));
  el.eyeL.setAttribute('transform', `translate(8.95 ${(12.2 + eyeYOffset).toFixed(3)}) rotate(${(-5 - squeeze * 1.5).toFixed(3)}) scale(${(1 - squeeze * 0.030).toFixed(3)})`);
  el.eyeR.setAttribute('transform', `translate(15.05 ${(12.25 + eyeYOffset).toFixed(3)}) rotate(${(6 + squeeze * 1.2).toFixed(3)}) scale(${(1 - squeeze * 0.030).toFixed(3)})`);

  el.hardShadow.setAttribute('flood-opacity', '0.62');
  el.blueGlow.setAttribute('flood-opacity', '0.14');
  el.ground.setAttribute('rx', (8.5 + (breath - 0.5) * 0.4).toFixed(3));
  el.ground.setAttribute('opacity', '0.42');

  const rainPower = clamp01(P.rainBaseOpacity + rainBurst * P.rainBurstOpacity);
  el.rain.setAttribute('opacity', rainPower.toFixed(3));
  el.rain.setAttribute('stroke-width', (0.36 + rainBurst * 0.13).toFixed(3));
  RAIN_LINES.forEach((line, i) => {
    const visible = i < P.rainCount;
    const speed = P.rainBaseSpeed + rainBurst * P.rainBurstSpeed;
    const fall = mix(2.6, 6.2, rainBurst);
    const len = (line.len * P.rainBaseLength) + rainBurst * P.rainBurstLength;
    rainPaths[i].forEach((path, copyIndex) => {
      const p = (t * speed + line.delay + copyIndex / RAIN_COPIES) % 1;
      const fadeIn = smoothstep(0.00, 0.24, p);
      const fadeOut = 1 - smoothstep(0.76, 1.00, p);
      const fade = Math.max(0.12, fadeIn * fadeOut);
      const y1 = line.y + p * fall - squeeze * 0.30 - copyIndex * 0.15;
      const x1 = line.x - p * P.rainDrift - squeeze * 0.12;
      const y2 = y1 + len;
      const x2 = x1 - 0.42;
      path.setAttribute('d', `M${x1.toFixed(3)} ${y1.toFixed(3)} L${x2.toFixed(3)} ${y2.toFixed(3)}`);
      path.setAttribute('opacity', visible ? (line.alpha * fade * 0.72).toFixed(3) : '0');
    });
  });

  el.status.textContent = `phase ${phase.toFixed(2)} · squeeze ${squeeze.toFixed(2)} · rainBurst ${rainBurst.toFixed(2)} · rebound ${rebound.toFixed(2)} · sx ${sx.toFixed(3)} · sy ${sy.toFixed(3)}`;
}

function loop(now) {
  if (!paused) {
    renderAt(now - startedAt - pausedTotal);
  }
  requestAnimationFrame(loop);
}

buildParams();
requestAnimationFrame(loop);

document.getElementById('btn-theme').onclick = () => document.body.classList.toggle('light');
document.getElementById('btn-pause').onclick = () => {
  paused = !paused;
  if (paused) pauseStart = performance.now();
  else pausedTotal += performance.now() - pauseStart;
};
document.getElementById('btn-reset').onclick = () => {
  P = { ...DEFAULTS };
  buildParams();
};
</script>
</body>
</html>
