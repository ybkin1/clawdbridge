<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' file:; style-src 'unsafe-inline'; script-src 'unsafe-inline'; object-src 'self' file:; img-src 'self' file: data:;">
<title>Animation Preview</title>
<style>
html,
body {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: hidden;
  background: transparent;
}
#preview {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
#preview object {
  display: block;
  flex: 0 0 auto;
  width: 285%;
  height: 285%;
  border: 0;
  object-fit: contain;
}
</style>
</head>
<body>
<div id="preview"></div>
<script>
(function initPreviewRenderer() {
  const preview = document.getElementById("preview");

  window.renderAnimationPreviewPoster = function renderAnimationPreviewPoster(src) {
    return new Promise((resolve) => {
      let url = null;
      try {
        url = new URL(src || "");
      } catch {
        resolve(false);
        return;
      }
      if (url.protocol !== "file:") {
        resolve(false);
        return;
      }

      preview.textContent = "";
      const object = document.createElement("object");
      object.type = "image/svg+xml";
      object.data = url.href;
      object.setAttribute("aria-hidden", "true");

      let settled = false;
      const settle = (ok) => {
        if (settled) return;
        settled = true;
        window.setTimeout(() => resolve(ok), 80);
      };
      object.addEventListener("load", () => settle(true), { once: true });
      object.addEventListener("error", () => settle(false), { once: true });
      preview.appendChild(object);
      window.setTimeout(() => settle(true), 600);
    });
  };

  const initialSrc = new URLSearchParams(window.location.search).get("src");
  if (initialSrc) window.renderAnimationPreviewPoster(initialSrc);
})();
</script>
</body>
</html>
