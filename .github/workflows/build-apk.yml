name: Build ClawdBridge APK

on:
  push:
    branches: [master, main]
    paths:
      - 'mobile/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:
    inputs:
      release:
        description: 'Publish as Release?'
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 ndk;26.1.10909125 platform-tools cmdline-tools;latest'

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > mobile/android/local.properties
          echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> mobile/android/local.properties

      - name: Install dependencies
        run: |
          cd mobile
          npm install --legacy-peer-deps

      - name: Make gradlew executable
        run: chmod +x mobile/android/gradlew

      - name: Build Release APK
        run: |
          cd mobile/android
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p release
          cp mobile/android/app/build/outputs/apk/release/app-release.apk release/clawdbridge-v${{ github.run_number }}.apk

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: clawdbridge-apk-v${{ github.run_number }}
          path: release/
          retention-days: 30

      - name: Publish GitHub Release
        if: success() && github.event.inputs.release != 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0
          name: "ClawdBridge v0.1.0"
          body: |
            ## ClawdBridge Mobile APK
            - 版本: 0.1.0
            - 构建编号: ${{ github.run_number }}
            ### 安装说明
            1. 下载 APK 文件到手机
            2. 允许"未知来源"安装
            3. 点击安装即可
          files: release/*.apk
          prerelease: false
          make_latest: true
