name: Build ClawdBridge APK

on:
  push:
    branches: [master, main]
    paths:
      - 'mobile/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 ndk;26.1.10909125 platform-tools'

      - name: Install dependencies
        run: |
          cd mobile
          npm ci

      - name: Make gradlew executable
        run: chmod +x mobile/android/gradlew

      - name: Build Release APK
        run: |
          cd mobile/android
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Verify APK
        run: |
          find mobile/android/app/build/outputs -name "*.apk" -exec ls -lh {} \;

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawdbridge-apk-v${{ github.run_number }}
          path: mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 30
