name: Build ClawdBridge APK

on:
  push:
    branches: [master, main]
    paths:
      - 'mobile/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 ndk;26.1.10909125 platform-tools cmdline-tools;latest'

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > mobile/android/local.properties
          echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> mobile/android/local.properties

      - name: Install dependencies
        run: |
          cd mobile
          npm install --legacy-peer-deps

      - name: Make gradlew executable
        run: chmod +x mobile/android/gradlew

      - name: Build Release APK
        run: |
          cd mobile/android
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Commit APK to repo
        run: |
          cp mobile/android/app/build/outputs/apk/release/app-release.apk clawdbridge.apk
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add clawdbridge.apk
          git diff --cached --quiet || git commit -m "build: update APK (run ${{ github.run_number }})"
          git push
