name: Build ClawdBridge APK

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/build-apk.yml'
      - 'mobile/android/build.gradle'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 ndk;26.1.10909125 platform-tools cmdline-tools;latest'

      - run: echo "sdk.dir=$ANDROID_SDK_ROOT" > mobile/android/local.properties

      - name: Install dependencies
        run: |
          cd mobile
          npm install --legacy-peer-deps
        continue-on-error: true

      - run: chmod +x mobile/android/gradlew

      - name: Build APK
        run: |
          cd mobile/android
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          ./gradlew assembleRelease --no-daemon --stacktrace
        continue-on-error: true

      - name: Find APK files
        run: |
          echo "Searching for APK files..."
          find mobile/android -name "*.apk" -type f 2>/dev/null | head -20
          echo "---"
          ls -la mobile/android/app/build/outputs/apk/release/ 2>/dev/null || echo "Release directory not found"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawdbridge-apk
          path: |
            mobile/android/app/build/outputs/apk/release/*.apk
            mobile/android/app/build/outputs/apk/debug/*.apk
            mobile/android/**/*.apk
          retention-days: 90
          if-no-files-found: warn

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: mobile/android/build.log
          if-no-files-found: ignore

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: mobile/android/app/build/outputs/apk/release/*.apk
          tag_name: v0.1.0-${{ github.run_number }}
          name: ClawdBridge APK v0.1.0-${{ github.run_number }}
          body: |
            Automated build of ClawdBridge APK
            Build Date: ${{ github.event.head_commit.timestamp }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}