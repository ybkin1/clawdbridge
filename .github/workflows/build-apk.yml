name: Build ClawdBridge APK

on:
  push:
    branches: [main, master]
    paths:
      - 'mobile/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - aab

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: |
          cd mobile
          npm config set registry https://registry.npmmirror.com
          npm ci

      - name: Configure Gradle mirror (China)
        run: |
          cd mobile/android
          sed -i 's|https\\://services.gradle.org/distributions/|https\\://mirrors.cloud.tencent.com/gradle/|g' gradle/wrapper/gradle-wrapper.properties

      - name: Make gradlew executable
        run: chmod +x mobile/android/gradlew

      - name: Build APK
        run: |
          cd mobile/android
          ./gradlew assembleRelease --no-daemon --max-workers=2

      - name: Rename APK
        run: |
          cd mobile/android/app/build/outputs/apk/release
          mv app-release.apk clawdbridge-v${{ github.run_number }}.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawdbridge-apk-v${{ github.run_number }}
          path: mobile/android/app/build/outputs/apk/release/clawdbridge-*.apk
          retention-days: 30

      - name: APK Info
        run: |
          echo "✅ APK 构建成功"
          echo "📦 文件位置: mobile/android/app/build/outputs/apk/release/"
          ls -lh mobile/android/app/build/outputs/apk/release/
