name: Build ClawdBridge APK

on:
  push:
    branches: [master, main]
    paths:
      - 'mobile/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 ndk;26.1.10909125 platform-tools cmdline-tools;latest'

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > mobile/android/local.properties
          echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> mobile/android/local.properties

      - name: Install dependencies
        run: |
          cd mobile
          npm install --legacy-peer-deps

      - name: Make gradlew executable
        run: chmod +x mobile/android/gradlew

      - name: Build Release APK
        run: |
          cd mobile/android
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Prepare APK for release
        run: |
          mkdir -p release
          cp mobile/android/app/build/outputs/apk/release/app-release.apk release/clawdbridge.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawdbridge-apk-v${{ github.run_number }}
          path: release/
          retention-days: 30

      - name: Delete old tag and release
        run: |
          git push origin :refs/tags/v0.1.0 2>/dev/null || true
          gh release delete v0.1.0 --yes 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0
          name: "ClawdBridge v0.1.0 (Build ${{ github.run_number }})"
          body: |
            ## ClawdBridge Mobile APK
            - 版本: 0.1.0
            - 构建编号: ${{ github.run_number }}
            - 提交: ${{ github.sha }}
            
            ### 📱 手机安装说明
            1. 下载 clawdbridge.apk
            2. 允许"未知来源"安装
            3. 点击安装
            
            ### 系统要求
            - Android 8.0 (API 26) 及以上
          files: release/clawdbridge.apk
          overwrite: true
          make_latest: true
