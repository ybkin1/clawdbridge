name: Build ClawdBridge APK

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/build-apk.yml'
      - 'mobile/android/build.gradle'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 ndk;26.1.10909125 platform-tools cmdline-tools;latest'

      - run: echo "sdk.dir=$ANDROID_SDK_ROOT" > mobile/android/local.properties

      - name: Install dependencies
        run: |
          cd mobile
          npm install --legacy-peer-deps
        continue-on-error: true

      - run: chmod +x mobile/android/gradlew

      - name: Build APK
        id: build
        run: |
          cd mobile/android
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          ./gradlew assembleRelease --no-daemon --stacktrace --info
        continue-on-error: true

      - name: Check build outputs
        id: check
        run: |
          echo "Checking build outputs..."
          ls -la mobile/android/app/build/outputs/apk/release/ 2>/dev/null || echo "Release directory not found"
          ls -la mobile/android/app/build/outputs/apk/ 2>/dev/null || echo "APK directory not found"
          find mobile/android -name "*.apk" 2>/dev/null || echo "No APK files found"
          # Check if APK exists and set output
          if [ -f "mobile/android/app/build/outputs/apk/release/app-release.apk" ]; then
            echo "apk_found=true" >> $GITHUB_OUTPUT
            echo "APK found!"
          else
            echo "apk_found=false" >> $GITHUB_OUTPUT
            echo "APK not found"
          fi

      - name: Upload APK Artifact
        if: steps.check.outputs.apk_found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: clawdbridge-apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Upload all APKs if found
        if: steps.check.outputs.apk_found == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: all-apks
          path: mobile/android/**/*.apk
          retention-days: 90
          if-no-files-found: ignore

      - name: Upload build logs
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: mobile/android/build.log
          if-no-files-found: ignore
