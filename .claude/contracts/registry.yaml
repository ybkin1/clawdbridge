    verification_mode: "hybrid"
    checklist_refs: ["stage4-design-review", "stage5-plan-review", "stage6-coding-review"]
    checker_refs:
      - "design-plan-bidirectional-ref-check"
      - "packet-size-check"
      - "code-packet-annotation-check"
      - "orphan-code-detection"
      - "exception-path-coverage-check"
      - "state-transition-coverage-check"
      - "assembly-interface-alignment-check"
