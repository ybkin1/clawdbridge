# Converted from Markdown-embedded YAML to pure YAML
version: 2
updated_at: "2026-05-11"

# 契约版本号机制：
# 每次契约内容变更时递增对应契约的 version 字段
# 任务初始化时快照使用的契约版本到 task state 中
# 如果任务运行期间契约被修改，以任务快照的版本为准，不采用新版本

# 状态词汇
# draft-ready: 可作候选参考，不得进入 active_contract_set
# provisional: 限定 scope + opt-in 时作参考
# active: 全量生效，自动加载到 active_contract_set

contracts:
  # === Meta ===
  contract-schema:
    version: 1
    status: active
    effective_scope: [all contracts]
    depends_on: []
    conflicts_with: []
    description: "契约结构规范：统一元数据信封 + 10章节布局 + Checker/Narrative分离"
    owner: "claude-code"
    verification_mode: "automated"
    checklist_refs: ["contract-completeness-checklist"]
    checker_refs: []

  # === Core ===
  intent-capture:
    version: 1
    status: active
    effective_scope: [ownership_route, delivery_mode, task_chain_route]
    depends_on: []
    conflicts_with: []
    description: "意图捕获：9字段 intent artifact"
    owner: "claude-code"
    verification_mode: "manual"
    checklist_refs: []
    checker_refs: []

  intent-routing:
    version: 1
    status: active
    effective_scope: [all tasks]
    depends_on: []
    conflicts_with: []
    description: "意图路由：用户请求 → action_family → 契约/工具/Skill 一键路由"
    owner: "claude-code"
    verification_mode: "automated"
    checklist_refs: []
    checker_refs: ["state-projection-alignment-check"]

  task-routing:
    version: 1
    status: active
    effective_scope: [ownership_route, delivery_mode, task_chain_route, workflow_route, execution_orchestration_route, review_requirement_route, escalation_route]
    depends_on: [intent-capture]
    conflicts_with: []
    description: "任务路由：7步路由决策"
    checklist_refs: []
    checker_refs: []

  action-governance:
    version: 1
    status: active
    effective_scope: [action_family, artifact_kind]
    depends_on: [task-routing, task-tracking]  # skill-tool-mapping removed: data consumer, not loading prerequisite
    conflicts_with: []
    description: "动作治理：先判动作再选工具"
    checklist_refs: []
    checker_refs: []

  skill-tool-mapping:
    version: 1
    status: active
    effective_scope: [action_family, artifact_kind]
    depends_on: [task-routing]
    conflicts_with: []
    description: "技能与工具路由：意图识别→工具选择→安装态检查→调用决策→反模式禁止"
    checklist_refs: []
    checker_refs: []

  context-governance:
    version: 1
    status: active
    effective_scope: [action_family]
    depends_on: [action-governance]
    conflicts_with: []  # context-compaction 是 context-governance 预算阈值的执行机制，非真正冲突
    description: "上下文治理：6层加载 + 信任画像 + 预算阈值"
    checklist_refs: []
    checker_refs: ["context-budget-delegation-check"]

  task-tracking:
    version: 1
    status: active
    effective_scope: [phase, subphase, phase_status, delivery_mode]
    depends_on: [intent-capture, task-routing]
    conflicts_with: []  # 状态机定义与 workflow 协同，非冲突
    description: "任务跟踪：10阶段状态机 + 真相源 + 脏链路防止"
    owner: "claude-code"
    verification_mode: "automated"
    checklist_refs: []
    checker_refs: ["state-projection-alignment-check", "dangling-reference-check"]

  # === Build ===
  lego-assembly-workflow:
    version: 2
    status: active
    effective_scope: [delivery_mode=full, phase=build, action_family=implementation]
    depends_on: [cluster-orchestration, work-packet-governance, task-tracking, skill-tool-mapping]
    conflicts_with: []
    description: "乐高拼装工作流：从架构到代码块的多级拆装→Agent集群制造→逐级拼装→异常恢复。v2 新增 L4 函数级详设强制章节 §14-§18"
    owner: "claude-code"
    verification_mode: "manual"
    checklist_refs: ["stage4-design-review", "stage5-plan-review", "stage6-coding-review"]
    checker_refs: ["assembly-interface-alignment-check"]

  work-packet-governance:
    version: 2
    status: active
    effective_scope: [delivery_mode=full, phase=build]
    depends_on: [task-tracking]  # architecture-blueprint removed: work packets decompose from architecture nodes but don't require the contract itself to be loaded
    conflicts_with: []
    description: "工作包治理：12层搭积木拆包 + L4 函数级包约束 + oversized_justified 申报。v2 新增函数级拆包和包大小检查"
    owner: "claude-code"
    verification_mode: "manual"
    checklist_refs: ["stage5-plan-review"]
    checker_refs: ["packet-size-check"]

  architecture-blueprint:
    version: 1
    status: active
    effective_scope: [delivery_mode=full, phase=design|plan|build]
    depends_on: [task-tracking]  # lego-assembly-workflow removed: breaks circular dependency. architecture-blueprint defines structure first; lego-assembly consumes it via data reference, not loading prerequisite
    conflicts_with: []
    description: "架构蓝图：从大局到细节的拼装顺序"
    owner: "claude-code"
    verification_mode: "manual"
    checklist_refs: ["stage2-architecture-review", "stage4-design-review"]
    checker_refs: []

  # === Review ===
  review-gates:
    version: 1
    status: active
    effective_scope: [phase, action_family=review]
    depends_on: [task-tracking, intent-capture]
    conflicts_with: [exception-governance]  # 异常治理不可豁免 formal review（反向声明）
    description: "评审门控：value→professional→contract 三层"
    owner: "claude-code"
    verification_mode: "manual"
    checklist_refs: ["stage1-learning-review", "stage2-architecture-review", "stage3-prd-review", "stage4-design-review", "stage5-plan-review", "stage6-coding-review", "stage7-test-review"]
    checker_refs: ["review-consistency-check"]

  review-consistency-checklist:
    version: 1
    status: active
    effective_scope: [phase, action_family=review]
    depends_on: [review-gates, task-tracking]
    conflicts_with: []
    description: "审查一致性：12项自动化检查"
    owner: "claude-code"
    verification_mode: "automated"
    checklist_refs: []
    checker_refs: ["review-consistency-check"]

  # === Governance ===
  memory-architecture:
    version: 1
    status: active
    effective_scope: [all]
    depends_on: []
    conflicts_with: []
    description: "记忆架构：4层 + 6类对象 + 8目的地分流 + 晋升链 + 衰减"
    owner: "claude-code"
    verification_mode: "manual"
    checklist_refs: []
    checker_refs: []

  verification-checker:
    version: 1
    status: active
    effective_scope: [phase=verify|acceptance, action_family=verification]
    depends_on: [review-gates]
    conflicts_with: []
    description: "验证检查器：checker catalog + 结果形状"
    owner: "claude-code"
    verification_mode: "automated"
    checklist_refs: []
    checker_refs: []

  exception-governance:
    version: 1
    status: active
    effective_scope: [all]
    depends_on: []
    conflicts_with: [review-gates]  # 不可豁免 formal review
    description: "异常治理：5类异常 + 不可豁免规则"
    owner: "claude-code"
    verification_mode: "manual"
    checklist_refs: []
    checker_refs: []

  closeout:
    version: 1
    status: active
    effective_scope: [phase=release-ready, action_family=closeout]
    depends_on: [review-gates, task-readme-lifecycle]
    conflicts_with: []
    description: "收口契约：4类收口 + 前置条件"
    owner: "claude-code"
    verification_mode: "manual"
    checklist_refs: ["release-checklist"]
    checker_refs: []

  task-readme-lifecycle:
    version: 1
    status: active
    effective_scope: [delivery_mode=full, phase=research|spec|design|build|verify]
    depends_on: [task-tracking]
    conflicts_with: []
    description: "README生命周期：开发态/交付态"
    owner: "claude-code"
    verification_mode: "manual"
    checklist_refs: []
    checker_refs: []

  # === Quality ===
  document-depth:
    version: 2
    status: active
    effective_scope: [action_family=authoring, artifact_kind=prd|design-spec|contract]
    depends_on: [review-gates]
    conflicts_with: []
    description: "文档深度：深度/密级/成熟度。v2 新增 implementation_blueprint L4 函数级强制要求"
    owner: "claude-code"
    verification_mode: "manual"
    checklist_refs: ["stage4-design-review"]
    checker_refs: []

  engineering-standards:
    version: 1
    status: provisional
    effective_scope: [action_family=implementation|verification, delivery_mode=full]
    depends_on: [task-routing, action-governance]
    conflicts_with: []
    description: "工程标准：治理接线"
    owner: "claude-code"
    verification_mode: "manual"
    checklist_refs: ["tech-review-checklist", "code-review-checklist"]
    checker_refs: []

  cluster-orchestration:
    version: 1
    status: provisional
    effective_scope: [execution_orchestration_route=mandatory_multi_agent|recommended_multi_agent]
    depends_on: [task-tracking, work-packet-governance]
    conflicts_with: []
