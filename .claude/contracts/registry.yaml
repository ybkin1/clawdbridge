    owner: "claude-code"
    verification_mode: "manual"
    checklist_refs: []
    checker_refs: []

  context-compaction:
    version: 1
    status: active
    effective_scope: [all tasks, context_budget >= 55%]
    depends_on: [context-governance]
    conflicts_with: []
    description: "上下文压缩：55/70/85三级梯度 + 保留/压缩/丢弃策略 + receipt"
    owner: "claude-code"
    verification_mode: "manual"
    checklist_refs: []
    checker_refs: ["compaction-trigger-closure-check"]

  # === Quality Assurance ===
  scenario-traceability:
    version: 3
    status: active
    effective_scope: [phase=build|verify, action_family=verification]
    depends_on: [task-tracking, review-gates]
