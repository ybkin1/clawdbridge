# write-permissions.yaml — 文件写入权限矩阵的机器可读配置
#
# 来源：task-tracking-workflow-spec.md §6
# 维护者：规范架构维护者
# 消费方：MCP constraint-enforcer, PreToolUse Hook

version: 1
updated_at: "2026-05-12"

roles:
  - id: orchestrator
    description: "主线程（编排器）"
    allows:
      - pattern: "**/00-task-state.yaml"
      - pattern: "**/00-user-intent.md"
      - pattern: "**/board.yaml"
      - pattern: "**/README.md"
      - pattern: "**/checkpoint"
      - pattern: "**/route-projection.yaml"
      - pattern: "**/artifacts/**"
    blocks:
      - pattern: "**/review-bundles/**"
      - pattern: "**/reviews/*.md"
      - pattern: "**/reviews/receipt-*.yaml"

  - id: worker
    description: "子 Agent（执行单元）"
    allows:
      - pattern: "**/artifacts/**"
    blocks:
      - pattern: "**/00-task-state.yaml"
      - pattern: "**/00-user-intent.md"
      - pattern: "**/review-bundles/**"

  - id: reviewer
    description: "评审 Agent"
    allows:
      - pattern: "**/reviews/*.md"
      - pattern: "**/reviews/receipt-*.yaml"
      - pattern: "**/review-bundles/**/03-hard-fail-rules.yaml"
    blocks:
      - pattern: "**/artifacts/**"
      - pattern: "**/00-task-state.yaml"

# 敏感文件模式（用于 validate_write_permission 的 sensitivity 判定）
sensitive_patterns:
  - name: state_file
    regex: "^.*00-task-state\\.yaml$"
    description: "任务状态真相源"

  - name: evidence_lock
    regex: "^.*evidence-lock-.*\\.yaml$"
    description: "证据锁文件"

  - name: checker_result
    regex: "^.*checkers/[^/]+\\.yaml$"
    exclude: "evidence-lock"
    description: "Checker 结果文件"

  - name: receipt
    regex: "^.*reviews/receipt-.*\\.yaml$"
    description: "评审收据"

# 受保护的状态转换（写入这些字段需要 readiness 满足）
protected_transitions:
  - target_field: "phase_status"
    forbidden_values: ["passed", "archived"]
    requires_readiness: true
    reason: "phase_transition attempt without evidence lock. Use request_phase_transition."

  - target_field: "closeout_allowed"
    forbidden_values: [true]
    requires_readiness: true
    reason: "closeout attempt without passing all gates."
